# region ERT

- type: entity
  parent: CrateCommandSecure
  id: CrateBorgChassisERTBattery
  name: ERT borg crate
  suffix: ERT, Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: PlayerBorgChassisERTBattery
        - id: MindBearer

